<!DOCTYPE html>
<html>
<head>
<title>Priyanshu Classes Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Segoe UI; background:#f1f5f9; }
header { background:#0f172a; color:white; padding:15px; text-align:center; }
.container { display:flex; height:100vh; }
.sidebar {
  width:220px;
  background:#1e293b;
  color:white;
  padding:15px;
}
.sidebar button {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#334155;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}
.sidebar button:hover { background:#475569; }

.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

.card {
  background:white;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

iframe {
  width:100%;
  height:300px;
  border-radius:8px;
  margin-top:10px;
}

input, select {
  padding:10px;
  margin:8px 0;
  width:100%;
  max-width:400px;
}

button.primary {
  background:#2563eb;
  color:white;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.hidden { display:none; }
.logout { background:red !important; }
.delete { background:#dc2626; color:white; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>

<body>

<header>
<h2>Priyanshu Classes</h2>
</header>

<div id="authSection" style="text-align:center;padding:40px;">
<h3>Login</h3>
<input type="email" id="loginEmail" placeholder="Email"><br>
<input type="password" id="loginPassword" placeholder="Password"><br>
<button class="primary" onclick="login()">Login</button>
<p>Don't have account?</p>
<button onclick="showSignup()">Sign Up</button>
</div>

<div id="signupSection" class="hidden" style="text-align:center;padding:40px;">
<h3>Create Account</h3>
<input type="email" id="signupEmail" placeholder="Email"><br>
<input type="password" id="signupPassword" placeholder="Password"><br>
<button class="primary" onclick="signUp()">Create Account</button>
<button onclick="showLogin()">Back</button>
</div>

<div id="dashboard" class="container hidden">

<div class="sidebar" id="sidebar"></div>

<div class="main">
<h3 id="pageTitle">Dashboard</h3>
<div id="mainContent"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = { /* YOUR CONFIG HERE */ };
const ADMIN_EMAIL="priyanshukumar6618@gmail.com";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

window.showSignup=()=>{ authSection.classList.add("hidden"); signupSection.classList.remove("hidden"); }
window.showLogin=()=>{ signupSection.classList.add("hidden"); authSection.classList.remove("hidden"); }

window.signUp=async()=>{
await createUserWithEmailAndPassword(auth,signupEmail.value,signupPassword.value);
alert("Account Created!");
showLogin();
}

window.login=async()=>{
await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
}

window.logout=()=>signOut(auth);

function extractYouTubeID(url){
const regExp=/(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&#]+)/;
const match=url.match(regExp);
return match?match[1]:null;
}

function loadSidebar(user){
sidebar.innerHTML="";

if(user.email===ADMIN_EMAIL){
sidebar.innerHTML+=`<button onclick="showAdmin()">Admin Panel</button>`;
}else{
["English","Maths","Reasoning","GK/GS"].forEach(sub=>{
sidebar.innerHTML+=`<button onclick="loadSubject('${sub}')">${sub}</button>`;
});
}

sidebar.innerHTML+=`<button class="logout" onclick="logout()">Logout</button>`;
}

window.showAdmin=()=>{
pageTitle.innerText="Admin Panel";
mainContent.innerHTML=`
<h4>Add Content</h4>
<select id="subject">
<option>English</option>
<option>Maths</option>
<option>Reasoning</option>
<option>GK/GS</option>
</select>
<select id="type">
<option value="video">Video</option>
<option value="pdf">PDF</option>
</select>
<input type="text" id="title" placeholder="Title">
<input type="text" id="link" placeholder="YouTube or Drive Link">
<button class="primary" onclick="addContent()">Add</button>
<hr>
<h4>All Content</h4>
<div id="adminContent"></div>
`;

loadAdminContent();
}

window.addContent=async()=>{
await addDoc(collection(db,"content"),{
subject:subject.value,
type:type.value,
title:title.value,
link:link.value
});
alert("Content Added");
showAdmin();
}

async function loadAdminContent(){
const snap=await getDocs(collection(db,"content"));
adminContent.innerHTML="";
snap.forEach(d=>{
const data=d.data();
adminContent.innerHTML+=`
<div class="card">
<b>${data.subject}</b> - ${data.title}
<button class="delete" onclick="deleteContent('${d.id}')">Delete</button>
</div>
`;
});
}

window.deleteContent=async(id)=>{
await deleteDoc(doc(db,"content",id));
showAdmin();
}

window.loadSubject=async(sub)=>{
pageTitle.innerText=sub;
mainContent.innerHTML="Loading...";
const snap=await getDocs(collection(db,"content"));
mainContent.innerHTML="";
snap.forEach(d=>{
const data=d.data();
if(data.subject===sub){
let contentHTML="";
if(data.type==="video"){
const vid=extractYouTubeID(data.link);
contentHTML=`<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;
}else{
const preview=data.link.replace('/view','/preview');
contentHTML=`<iframe src="${preview}"></iframe>`;
}
mainContent.innerHTML+=`
<div class="card">
<h4>${data.title}</h4>
${contentHTML}
</div>
`;
}
});
}

onAuthStateChanged(auth,(user)=>{
if(user){
authSection.classList.add("hidden");
signupSection.classList.add("hidden");
dashboard.classList.remove("hidden");
loadSidebar(user);
}else{
dashboard.classList.add("hidden");
authSection.classList.remove("hidden");
}
});

</script>
</body>
</html>
