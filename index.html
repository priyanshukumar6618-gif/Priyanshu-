<!DOCTYPE html>
<html>
<head>
<title>Priyanshu Classes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Segoe UI; background:#f1f5f9; }
header { background:#0f172a; color:white; padding:15px; text-align:center; }

.access-box {
  text-align:center;
  padding:80px 20px;
}

input {
  padding:12px;
  width:90%;
  max-width:350px;
  margin:10px;
}

button {
  padding:10px 20px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.container { display:flex; height:100vh; }

.sidebar {
  width:220px;
  background:#1e293b;
  color:white;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin:8px 0;
  padding:10px;
  background:#334155;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover { background:#475569; }

.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

.card {
  background:white;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

iframe {
  width:100%;
  height:300px;
  border-radius:8px;
  margin-top:10px;
}

.hidden { display:none; }
.logout { background:red !important; }
.delete { background:#dc2626; color:white; padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>

<body>

<header>
<h2>Priyanshu Classes</h2>
</header>

<!-- ACCESS PAGE -->
<div id="accessPage" class="access-box">
<h3>Enter Access Code</h3>
<input type="text" id="accessCode" placeholder="Enter Code">
<br>
<button id="enterBtn">Enter</button>
<p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <h3 id="pageTitle">Dashboard</h3>
    <div id="mainContent"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  /* 🔥 PASTE YOUR REAL FIREBASE CONFIG HERE 🔥 */
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentRole = "";

// ================= ACCESS CONTROL =================

function checkAccess() {
  const code = document.getElementById("accessCode").value.trim();
  const error = document.getElementById("error");

  if(code === "Priyanshu is great") {
    currentRole = "student";
    loadStudentSidebar();
  }
  else if(code === "Jai shree ram") {
    currentRole = "admin";
    loadAdminSidebar();
  }
  else {
    error.innerText = "Invalid Access Code";
    return;
  }

  document.getElementById("accessPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

document.getElementById("enterBtn").addEventListener("click", checkAccess);

document.getElementById("accessCode").addEventListener("keypress", function(e){
  if(e.key === "Enter") checkAccess();
});

function logout() {
  location.reload();
}

// ================= SIDEBAR =================

function loadStudentSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = `
    <button data-sub="English">English</button>
    <button data-sub="Maths">Maths</button>
    <button data-sub="Reasoning">Reasoning</button>
    <button data-sub="GK/GS">GK/GS</button>
    <button class="logout">Logout</button>
  `;

  sidebar.querySelectorAll("button[data-sub]").forEach(btn=>{
    btn.addEventListener("click", ()=> loadSubject(btn.dataset.sub));
  });

  sidebar.querySelector(".logout").addEventListener("click", logout);
}

function loadAdminSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = `
    <button id="adminPanelBtn">Admin Panel</button>
    <button class="logout">Logout</button>
  `;

  document.getElementById("adminPanelBtn").addEventListener("click", showAdmin);
  sidebar.querySelector(".logout").addEventListener("click", logout);
}

// ================= ADMIN =================

function showAdmin() {
  document.getElementById("pageTitle").innerText = "Admin Panel";
  document.getElementById("mainContent").innerHTML = `
    <h4>Add Content</h4>
    <select id="subject">
      <option>English</option>
      <option>Maths</option>
      <option>Reasoning</option>
      <option>GK/GS</option>
    </select>
    <select id="type">
      <option value="video">Video</option>
      <option value="pdf">PDF</option>
    </select>
    <input type="text" id="title" placeholder="Title">
    <input type="text" id="link" placeholder="YouTube or Drive Link">
    <button id="addBtn">Add</button>
    <hr>
    <h4>All Content</h4>
    <div id="adminContent"></div>
  `;

  document.getElementById("addBtn").addEventListener("click", addContent);
  loadAdminContent();
}

async function addContent() {
  const subject = document.getElementById("subject").value;
  const type = document.getElementById("type").value;
  const title = document.getElementById("title").value;
  const link = document.getElementById("link").value;

  await addDoc(collection(db,"content"),{
    subject, type, title, link
  });

  alert("Content Added Successfully");
  showAdmin();
}

async function loadAdminContent() {
  const snap = await getDocs(collection(db,"content"));
  const container = document.getElementById("adminContent");
  container.innerHTML = "";

  snap.forEach(d=>{
    const data = d.data();
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>${data.subject}</b> - ${data.title}
      <button class="delete">Delete</button>
    `;
    div.querySelector(".delete").addEventListener("click", async ()=>{
      await deleteDoc(doc(db,"content",d.id));
      showAdmin();
    });
    container.appendChild(div);
  });
}

// ================= STUDENT =================

function extractYouTubeID(url){
  const regExp = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&#]+)/;
  const match = url.match(regExp);
  return match ? match[1] : null;
}

async function loadSubject(sub){
  document.getElementById("pageTitle").innerText = sub;
  const container = document.getElementById("mainContent");
  container.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"content"));
  container.innerHTML = "";

  snap.forEach(d=>{
    const data = d.data();
    if(data.subject === sub){
      const div = document.createElement("div");
      div.className = "card";

      let contentHTML = "";

      if(data.type === "video"){
        const vid = extractYouTubeID(data.link);
        contentHTML = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;
      } else {
        const preview = data.link.replace('/view','/preview');
        contentHTML = `<iframe src="${preview}"></iframe>`;
      }

      div.innerHTML = `<h4>${data.title}</h4>${contentHTML}`;
      container.appendChild(div);
    }
  });
}

</script>

</body>
</html>
