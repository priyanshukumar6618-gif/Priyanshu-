<!DOCTYPE html>
<html>
<head>
  <title>Priyanshu Classes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin:0; background:#f4f6f9; text-align:center; }
    header { background:#1e3a8a; color:white; padding:20px; }
    input { padding:10px; width:80%; max-width:300px; margin:10px; }
    .btn { padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:5px; cursor:pointer; }
    .link { color:#2563eb; cursor:pointer; }
    .panel { display:none; margin-top:30px; }
    .logout { background:red; margin-top:20px; }
  </style>
</head>

<body>

<header>
  <h1>Priyanshu Classes</h1>
</header>

<!-- SIGN UP -->
<div id="signupPanel" class="panel" style="display:block;">
  <h2>Sign Up</h2>
  <input type="text" id="name" placeholder="Full Name"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password (min 6 chars)"><br>
  <button class="btn" onclick="signUp()">Create Account</button>
  <p>Already have an account? <span class="link" onclick="showLogin()">Login</span></p>
</div>

<!-- LOGIN -->
<div id="loginPanel" class="panel">
  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email"><br>
  <input type="password" id="loginPassword" placeholder="Password"><br>
  <button class="btn" onclick="login()">Login</button>
  <p>New user? <span class="link" onclick="showSignup()">Sign Up</span></p>
</div>

<!-- SUBJECT PANEL -->
<div id="subjectPanel" class="panel">
  <h2 id="welcomeText"></h2>
  <h3>Select Subject</h3>
  <button class="btn">Maths</button>
  <button class="btn">English</button>
  <button class="btn logout" onclick="logout()">Logout</button>
</div>

<!-- VERIFY MESSAGE -->
<div id="verifyPanel" class="panel">
  <h3>Please verify your email 📧</h3>
  <p>We sent a verification link to your email.</p>
  <button class="btn" onclick="resendVerification()">Resend Email</button>
  <button class="btn logout" onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendEmailVerification, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8IW_3JhAhGuVvFwBUoqFKwEFEFZhDr6A",
  authDomain: "priyanshu-24f9b.firebaseapp.com",
  projectId: "priyanshu-24f9b",
  storageBucket: "priyanshu-24f9b.firebasestorage.app",
  messagingSenderId: "656305585506",
  appId: "1:656305585506:web:e75d7a29e9add61e67803b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function hideAll() {
  document.getElementById("signupPanel").style.display="none";
  document.getElementById("loginPanel").style.display="none";
  document.getElementById("subjectPanel").style.display="none";
  document.getElementById("verifyPanel").style.display="none";
}

window.showLogin = function() {
  hideAll();
  document.getElementById("loginPanel").style.display="block";
}

window.showSignup = function() {
  hideAll();
  document.getElementById("signupPanel").style.display="block";
}

window.signUp = async function() {
  try {
    const name=document.getElementById("name").value;
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;

    const userCredential = await createUserWithEmailAndPassword(auth,email,password);
    await updateProfile(userCredential.user,{displayName:name});
    await sendEmailVerification(userCredential.user);

    alert("Account created! Please verify your email.");
  } catch(error){
    alert(error.message);
  }
}

window.login = async function() {
  try {
    const email=document.getElementById("loginEmail").value;
    const password=document.getElementById("loginPassword").value;

    await signInWithEmailAndPassword(auth,email,password);
  } catch(error){
    alert(error.message);
  }
}

window.logout = function() {
  signOut(auth);
}

window.resendVerification = function(){
  sendEmailVerification(auth.currentUser);
  alert("Verification email sent again!");
}

onAuthStateChanged(auth, async (user) => {
  if(user){
    await user.reload();

    if(user.emailVerified){
      hideAll();
      document.getElementById("subjectPanel").style.display="block";
      document.getElementById("welcomeText").innerText =
        "Welcome, " + user.displayName + " 👋";
    } else {
      hideAll();
      document.getElementById("verifyPanel").style.display="block";
    }
  } else {
    hideAll();
    document.getElementById("signupPanel").style.display="block";
  }
});
</script>

</body>
</html>
